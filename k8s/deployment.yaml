apiVersion: v1
kind: Namespace
metadata:
  name: llm-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: llm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "llm_user"
        - name: POSTGRES_PASSWORD
          value: "llm_password"
        - name: POSTGRES_DB
          value: "llm_db"
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: llm-app
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: llm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: llm-app
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: llm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
      - name: ingestion-service
        image: ingestion-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: llm-app
spec:
  ports:
  - port: 8001
    targetPort: 8001
  selector:
    app: ingestion-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: llm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
      - name: chat-service
        image: chat-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://llm_user:llm_password@db:5432/llm_db"
        - name: INGESTION_URL
          value: "http://ingestion-service:8001/ingest"
        - name: OPENAI_API_KEY
          value: "sk-mock-key"
        - name: ANTHROPIC_API_KEY
          value: "sk-mock-key"
        - name: GEMINI_API_KEY
          value: "sk-mock-key"
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: llm-app
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: chat-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: llm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
      - name: worker-service
        image: worker-service:latest
        imagePullPolicy: Never
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: DATABASE_URL
          value: "postgresql://llm_user:llm_password@db:5432/llm_db"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: llm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://chat-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: llm-app
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080
  selector:
    app: frontend
